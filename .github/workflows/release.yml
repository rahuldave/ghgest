name: Release
permissions:
  actions: write
  contents: write
on:
  push:
    tags:
      - "[0-9]+.*"
jobs:
  wait-for-build:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Build workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha="${{ github.sha }}"
          echo "Waiting for Build workflow to complete on $sha..."
          while true; do
            result=$(gh api "repos/${{ github.repository }}/actions/workflows/build.yml/runs" \
              --jq ".workflow_runs[] | select(.head_sha == \"$sha\") | .conclusion" | head -1)
            case "$result" in
              success) echo "Build passed"; exit 0 ;;
              failure|cancelled|timed_out) echo "Build $result"; exit 1 ;;
              *) echo "Build still running..."; sleep 30 ;;
            esac
          done
  create-release:
    needs: wait-for-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          draft: true
          title: v$tag
          token: ${{ secrets.GITHUB_TOKEN }}
  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: gest
          target: ${{ matrix.target }}
          archive: gest-v$tag-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
  publish-crate:
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
  publish-release:
    needs: [upload-assets, publish-crate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
      - name: Trigger docs deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run docs.yml
