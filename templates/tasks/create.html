{% extends "base.html" %}

{% block title %}New Task - gest{% endblock %}
{% block nav_tasks %}class="active"{% endblock %}

{% block content %}
<h1 class="section-heading">New Task</h1>
<div class="term">
  <div class="term-bar"><span class="term-title">create task</span></div>
  <div class="term-body">
    {% if let Some(err) = error %}
    <div class="form-error" style="margin-bottom: 12px;">{{ err }}</div>
    {% endif %}
    <form method="post" action="/tasks">
      <div class="form-group">
        <label for="title">Title</label>
        <input class="form-input" type="text" id="title" name="title" required autofocus placeholder="Task title..." value="{{ title }}">
      </div>
      <div class="form-group md-preview-container">
        <label for="description">Description</label>
        <button type="button" class="btn md-preview-btn md-preview-toggle" data-target="description">Preview</button>
        <textarea class="form-textarea" id="description" name="description" placeholder="Markdown supported...">{{ description }}</textarea>
        <div id="description-preview" class="md-preview md-content"></div>
      </div>
      <div class="form-group">
        <label for="priority">Priority</label>
        <select class="form-select" id="priority" name="priority">
          {% for option in priority_options %}
          <option value="{{ option.value }}"{% if option.selected %} selected{% endif %}>{{ option.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Create Task</button>
        <a class="btn" href="/tasks">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
